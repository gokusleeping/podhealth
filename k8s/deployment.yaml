apiVersion: apps/v1
kind: Deployment
metadata:
  name: app-with-health-sidecar
spec:
  replicas: 2
  selector:
    matchLabels:
      app: app-with-health-sidecar
  template:
    metadata:
      labels:
        app: app-with-health-sidecar
    spec:
      containers:
        - name: main-app
          image: ghcr.io/example/main-app:latest
          ports:
            - containerPort: 8081
          readinessProbe:
            httpGet:
              path: /health
              port: 8081
            initialDelaySeconds: 5
            periodSeconds: 5
        - name: pod-health-sidecar
          image: ghcr.io/example/pod-health-sidecar:latest
          imagePullPolicy: IfNotPresent
          envFrom:
            - configMapRef:
                name: pod-health-sidecar-config
          ports:
            - containerPort: 8080
              name: http
          resources:
            requests:
              cpu: "25m"
              memory: "32Mi"
            limits:
              cpu: "250m"
              memory: "64Mi"
          livenessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 2
          readinessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 3
            periodSeconds: 5
            timeoutSeconds: 2
